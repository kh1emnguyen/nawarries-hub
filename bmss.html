<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BMSS Order App</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  [x-cloak]{display:none}
  .tab-active{border-bottom:2px solid #3b82f6;color:#2563eb}
  .tab-inactive{border-bottom:2px solid transparent;color:#6b7280}
  .tab-inactive:hover{color:#374151}
  tr:last-child td{border-bottom:none}
  .help-drawer{transform:translateX(100%);transition:transform .3s ease}
  .help-drawer.open{transform:translateX(0)}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:9999px;font-size:11px;font-weight:700;padding:0 5px}
</style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

<div id="app" class="max-w-7xl mx-auto px-4 py-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">BMSS Order App</h1>
      <p id="subtitle" class="text-sm text-gray-500 mt-0.5">Bottlemart Sunshine — loading…</p>
    </div>
    <div class="flex gap-2 items-center">
      <button onclick="toggleHelp()" class="px-3 py-1.5 text-sm font-medium rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-700">? Briefing</button>
      <a href="../index.html" class="px-3 py-1.5 text-sm rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-gray-600">← Hub</a>
    </div>
  </div>

  <!-- Summary chips -->
  <div id="summary-chips" class="flex flex-wrap gap-2 mb-4"></div>

  <!-- Tab bar -->
  <div class="bg-white rounded-t-xl border border-b-0 border-gray-200 overflow-x-auto">
    <div id="tab-bar" class="flex px-2 pt-2"></div>
  </div>

  <!-- Panel -->
  <div class="bg-white rounded-b-xl border border-gray-200 shadow-sm p-5 min-h-64">
    <div id="panel-content">
      <div class="flex items-center justify-center h-40 text-gray-400">Loading data…</div>
    </div>
  </div>

  <p class="text-xs text-gray-400 mt-3 text-right" id="gen-ts"></p>
</div>

<!-- Help / Briefing drawer -->
<div id="help-overlay" onclick="toggleHelp()" class="fixed inset-0 bg-black/40 z-40 hidden"></div>
<div id="help-drawer" class="help-drawer fixed top-0 right-0 h-full w-full max-w-lg bg-white shadow-2xl z-50 flex flex-col">
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
    <h2 class="text-lg font-bold text-gray-800">Briefing & Guide</h2>
    <button onclick="toggleHelp()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
  </div>
  <div class="flex-1 overflow-y-auto px-5 py-4 text-sm text-gray-700 space-y-4" id="help-content"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  activeTab: 'orders',
  search: {},
  urgencyFilter: { orders: 'ALL' },
  causeFilter: { margins: 'ALL' },
  riskFilter: { pricing: 'ALL' },
  momentumTab: { momentum: 'rising' },
  sortBy: {},
  showAll: { revival: false },
  flags: JSON.parse(localStorage.getItem('bmss_flags') || '{"obsolete_items":[],"limited_edition_overrides":[]}'),
  data: {}
};

function saveFlags() { localStorage.setItem('bmss_flags', JSON.stringify(S.flags)); }

// ── Data loading ──────────────────────────────────────────────────────────────
const FILES = ['summary','orders','momentum','historical','margins','pricing','revival'];

async function loadAll() {
  try {
    const results = await Promise.all(FILES.map(f =>
      fetch(`data/${f}.json`).then(r => r.json())
    ));
    FILES.forEach((f,i) => S.data[f] = results[i]);
    render();
  } catch(e) {
    document.getElementById('panel-content').innerHTML =
      `<div class="text-red-500 p-4">Failed to load data: ${e.message}<br/>Make sure data/*.json files exist in the same directory.</div>`;
  }
}

// ── Badge counts ──────────────────────────────────────────────────────────────
function getBadge(tab) {
  const d = S.data;
  if (!d.summary) return 0;
  switch(tab) {
    case 'orders':    return (d.summary.orders_critical||0) + (d.summary.orders_high||0);
    case 'margins':   return d.summary.margin_issues_count||0;
    case 'pricing':   return d.summary.pricing_opportunities_count||0;
    case 'revival':   return (d.revival||[]).filter(x=>x.top_pick).length;
    case 'momentum':  return (d.momentum?.rising||[]).length;
    case 'historical':return 0;
    default: return 0;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
const TABS = [
  { key:'orders',    label:'Orders'    },
  { key:'momentum',  label:'Momentum'  },
  { key:'historical',label:'Historical'},
  { key:'margins',   label:'Margins'   },
  { key:'pricing',   label:'Pricing'   },
  { key:'revival',   label:'Revival'   },
];

function render() {
  renderSummary();
  renderTabs();
  renderPanel();
  renderGenTs();
}

function renderSummary() {
  const s = S.data.summary || {};
  const chips = [
    { label:`$${(s.latest_week_revenue||s.store_margin?.latest_week_revenue||0).toLocaleString(undefined,{maximumFractionDigits:0})}/wk`, color:'bg-blue-50 text-blue-700', title:'Latest week revenue' },
    { label:`${(s.store_margin?.latest_week_true_margin_pct||0).toFixed(1)}% margin`, color:'bg-green-50 text-green-700', title:'True margin this week' },
    { label:`${s.orders_critical||0} CRITICAL`, color:'bg-red-50 text-red-700', title:'Items critically out of stock' },
    { label:`$${(s.margin_total_dollar_drag||0).toFixed(0)} drag/wk`, color:'bg-orange-50 text-orange-700', title:'Weekly margin drag from below-floor items' },
    { label:`$${(s.pricing_annual_upside||0).toLocaleString(undefined,{maximumFractionDigits:0})} price upside/yr`, color:'bg-emerald-50 text-emerald-700', title:'Annual gain from pricing fixes' },
  ];
  document.getElementById('summary-chips').innerHTML = chips.map(c =>
    `<span class="px-3 py-1 rounded-full text-xs font-medium ${c.color}" title="${c.title}">${c.label}</span>`
  ).join('');
  const d = new Date(s.generated_at||'');
  document.getElementById('subtitle').textContent =
    `Bottlemart Sunshine${s.generated_at ? ' · Generated ' + d.toLocaleString('en-AU',{dateStyle:'medium',timeStyle:'short'}) : ''}`;
}

function renderGenTs() {
  const s = S.data.summary || {};
  const el = document.getElementById('gen-ts');
  if (s.generated_at) el.textContent = `Data generated: ${new Date(s.generated_at).toLocaleString('en-AU')} · Run python backend/main.py to refresh`;
}

function renderTabs() {
  const sorted = [...TABS].sort((a,b) => getBadge(b.key) - getBadge(a.key));
  document.getElementById('tab-bar').innerHTML = sorted.map(t => {
    const badge = getBadge(t.key);
    const active = S.activeTab === t.key;
    return `<button onclick="setTab('${t.key}')"
      class="flex items-center gap-1.5 px-4 py-2 text-sm font-medium border-b-2 transition-all whitespace-nowrap ${active?'tab-active':'tab-inactive'}">
      ${t.label}
      ${badge > 0 ? `<span class="badge ${active?'bg-blue-600 text-white':'bg-gray-200 text-gray-600'}">${badge}</span>` : ''}
    </button>`;
  }).join('');
}

function setTab(key) {
  S.activeTab = key;
  render();
}

function renderPanel() {
  const panel = document.getElementById('panel-content');
  switch(S.activeTab) {
    case 'orders':    panel.innerHTML = renderOrders();    break;
    case 'momentum':  panel.innerHTML = renderMomentum();  break;
    case 'historical':panel.innerHTML = renderHistorical();break;
    case 'margins':   panel.innerHTML = renderMargins();   break;
    case 'pricing':   panel.innerHTML = renderPricing();   break;
    case 'revival':   panel.innerHTML = renderRevival();   break;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const h = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const esc = s => h(s||'');

function sortByCategory(items, secondary) {
  return [...items].sort((a,b) => (a.category||'').localeCompare(b.category||'') || (secondary?secondary(b)-secondary(a):0));
}

function searchFilter(items, key) {
  const q = (S.search[key]||'').toLowerCase();
  return q ? items.filter(x => x.name.toLowerCase().includes(q)) : items;
}

function catGroupHtml(items, rowFn, cols) {
  const g = {};
  items.forEach(item => { (g[item.category||'Other'] = g[item.category||'Other']||[]).push(item); });
  return Object.entries(g).sort(([a],[b])=>a.localeCompare(b)).map(([cat,its]) =>
    `<tr class="bg-indigo-50"><td colspan="${cols}" class="px-4 py-1.5 text-xs font-bold text-indigo-700 uppercase tracking-wide">${esc(cat)} (${its.length})</td></tr>` +
    its.map(rowFn).join('')
  ).join('');
}

function controlBar(tabKey, extraControls='') {
  return `<div class="flex flex-wrap gap-2 items-center mb-3">
    <input type="text" placeholder="Search…" value="${esc(S.search[tabKey]||'')}"
      oninput="S.search['${tabKey}']=this.value;renderPanel()"
      class="border rounded px-3 py-1.5 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-blue-300"/>
    ${extraControls}
  </div>`;
}

function sortBtn(tabKey, key, label) {
  const active = (S.sortBy[tabKey]||'') === key || (!S.sortBy[tabKey] && key==='default');
  return `<button onclick="S.sortBy['${tabKey}']='${key}';renderPanel()"
    class="px-3 py-1 rounded text-xs font-medium border transition-all ${active?'bg-indigo-600 text-white border-indigo-600':'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}">${label}</button>`;
}

function filterBtn(stateKey, tabKey, val, label) {
  const cur = S[stateKey][tabKey]||'ALL';
  const active = cur===val;
  return `<button onclick="S['${stateKey}']['${tabKey}']='${val}';renderPanel()"
    class="px-3 py-1 rounded text-xs font-medium border transition-all ${active?'bg-gray-800 text-white border-gray-800':'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'}">${label}</button>`;
}

function tbl(head, body) {
  return `<div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
    <table class="min-w-full text-sm"><thead class="bg-gray-50 border-b border-gray-200">${head}</thead><tbody>${body||'<tr><td colspan="20" class="text-center py-8 text-gray-400">No items match filters</td></tr>'}</tbody></table></div>`;
}

function th(label, tip='', extra='') {
  return `<th class="px-4 py-2.5 text-left font-semibold text-gray-600 ${extra}" title="${esc(tip)}">${label}</th>`;
}
function thr(label, tip='', extra='') {
  return `<th class="px-4 py-2.5 text-right font-semibold text-gray-600 ${extra}" title="${esc(tip)}">${label}</th>`;
}

// ── Orders ────────────────────────────────────────────────────────────────────
const URGENCY_DOT  = {CRITICAL:'bg-red-500',HIGH:'bg-orange-400',MEDIUM:'bg-yellow-400',LOW:'bg-gray-300'};
const URGENCY_CHIP = {CRITICAL:'bg-red-100 border-red-400 text-red-800',HIGH:'bg-orange-100 border-orange-400 text-orange-800',MEDIUM:'bg-yellow-50 border-yellow-300 text-yellow-800',LOW:'bg-gray-50 border-gray-200 text-gray-700'};
const URGENCY_ORDER = {CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};

function renderOrders() {
  const uFilt = S.urgencyFilter.orders||'ALL';
  const sBy   = S.sortBy.orders||'urgency';
  const obs   = new Set((S.flags.obsolete_items||[]).map(n=>n.toLowerCase()));

  let items = searchFilter(S.data.orders||[], 'orders')
    .filter(x => uFilt==='ALL' || x.urgency===uFilt);

  if (sBy==='category') items = sortByCategory(items, x=>(URGENCY_ORDER[x.urgency]||3));

  const crit  = items.filter(x=>x.urgency==='CRITICAL').length;
  const high  = items.filter(x=>x.urgency==='HIGH').length;
  const cases = items.reduce((s,x)=>s+(x.recommend_cases||0),0);

  const head = `<tr>
    ${th('#','','')} ${th('Item','','')} ${th('Category','','')}
    ${thr('On Hand','Cases on shelf / in back','')} ${thr('Wks Cover','Weeks of stock remaining at current sales pace. OUT = zero stock.','')}
    ${thr('Velocity','Avg cases sold per week over last 4 weekly reports','')}
    ${thr('Order Cases','Cases to order to reach ~2 weeks of cover','bg-blue-50')}
    ${th('Urgency','CRITICAL=out of stock or protected item near 0; HIGH=protected/under 0.5wks; MEDIUM=under 1wk','text-center')}
    ${th('Notes','','')}
  </tr>`;

  const rowFn = (item,idx) => {
    const dot  = URGENCY_DOT[item.urgency]||'bg-gray-300';
    const chip = URGENCY_CHIP[item.urgency]||'bg-gray-100 text-gray-600';
    const woc  = item.weeks_of_cover;
    const wocHtml = woc!=null
      ? `<span class="font-semibold ${woc<=0.5?'text-red-600':woc<=1?'text-orange-600':'text-gray-700'}">${woc.toFixed(1)}w</span>`
      : `<span class="text-red-600 font-bold">OUT</span>`;
    return `<tr class="border-b border-gray-100 hover:bg-gray-50 ${item.urgency==='CRITICAL'?'bg-red-50':''}">
      <td class="px-3 py-2.5 text-gray-400 text-xs">${(idx+1)}</td>
      <td class="px-4 py-2.5">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="w-2 h-2 rounded-full flex-shrink-0 ${dot}"></span>
          <span class="font-medium text-gray-800">${esc(item.name)}</span>
          ${item.is_profit_protected?'<span class="text-xs px-1.5 py-0.5 rounded bg-purple-100 text-purple-700 font-medium" title="Top-profit item">PROFIT</span>':''}
          ${item.is_revenue_protected?'<span class="text-xs px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-medium" title="Top-revenue item">REV</span>':''}
        </div>
      </td>
      <td class="px-4 py-2.5 text-gray-500 text-xs">${esc(item.category)}</td>
      <td class="px-4 py-2.5 text-right text-gray-700">${(item.current_cases||0).toFixed(1)} cs<br/><span class="text-xs text-gray-400">${item.current_units||0} units</span></td>
      <td class="px-4 py-2.5 text-right">${wocHtml}</td>
      <td class="px-4 py-2.5 text-right text-gray-600 text-xs">${item.weekly_velocity_cases} cs/wk</td>
      <td class="px-4 py-2.5 text-right bg-blue-50">
        <span class="font-bold text-blue-700 text-base">${item.recommend_cases}</span>
        <span class="text-xs text-gray-400 ml-1">cs (${item.recommend_units} units)</span>
      </td>
      <td class="px-4 py-2.5 text-center">
        <span class="text-xs font-semibold px-2 py-0.5 rounded-full border ${chip}">${item.urgency}</span>
      </td>
      <td class="px-4 py-2.5 text-xs text-gray-500 max-w-xs">
        ${esc(item.notes)}
        ${item.promo_savings_last_week>0?`<br/><span class="text-amber-600">$${item.promo_savings_last_week.toFixed(2)} promo</span>`:''}
      </td>
    </tr>`;
  };

  const usBody = sBy==='category'
    ? catGroupHtml(items, (item,_,arr)=>rowFn(item,arr?arr.indexOf(item):0), 9)
    : items.map((item,i)=>rowFn(item,i)).join('');

  return `
    <div class="flex flex-wrap gap-2 mb-3">
      ${crit>0?`<span class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-sm font-semibold">${crit} CRITICAL</span>`:''}
      ${high>0?`<span class="px-3 py-1 rounded-full bg-orange-100 text-orange-700 text-sm font-semibold">${high} HIGH</span>`:''}
      <span class="px-3 py-1 rounded-full bg-blue-50 text-blue-700 text-sm"><strong>${items.length}</strong> items · <strong>${cases}</strong> cases</span>
    </div>
    ${controlBar('orders',
      `<div class="flex gap-1">${['ALL','CRITICAL','HIGH','MEDIUM','LOW'].map(u=>filterBtn('urgencyFilter','orders',u,u)).join('')}</div>`+
      `<div class="flex gap-1 ml-2 pl-2 border-l">${sortBtn('orders','urgency','Sort: Urgency')}${sortBtn('orders','category','Sort: Category')}</div>`
    )}
    ${tbl(`<tr>${head}</tr>`, items.length?usBody:'')}
    <p class="text-xs text-gray-400 mt-2">Showing ${items.length} of ${(S.data.orders||[]).length} items · PROFIT/REV = protected stock (always keep stocked)</p>`;
}

// ── Momentum ──────────────────────────────────────────────────────────────────
function renderMomentum() {
  const subTab = S.momentumTab.momentum||'rising';
  const sBy    = S.sortBy.momentum||'revenue';
  const mom    = S.data.momentum||{};
  const rising = mom.rising||[], falling = mom.falling||[], stable = mom.stable||[];
  const subTabs = [{k:'rising',label:`↑ Rising (${rising.length})`,color:'text-green-700'},{k:'falling',label:`↓ Falling (${falling.length})`,color:'text-red-700'},{k:'stable',label:`→ Stable (${stable.length})`,color:'text-gray-600'}];
  let items = ({rising,falling,stable})[subTab]||[];
  if (S.search.momentum) items = items.filter(x=>x.name.toLowerCase().includes(S.search.momentum.toLowerCase()));
  if (sBy==='category') items = sortByCategory(items, x=>x.revenue_latest_week||0);
  else items = [...items].sort((a,b)=>(b.revenue_latest_week||0)-(a.revenue_latest_week||0));

  const accent = subTab==='rising'?'text-green-700':subTab==='falling'?'text-red-700':'text-gray-600';

  const rowFn = (item) => {
    const pct = (item.pct_change_oldest_to_latest||0).toFixed(0);
    const sign = item.pct_change_oldest_to_latest>0?'+':'';
    const bars = (item.velocities||[]).map((v,i,arr)=>{
      const max = Math.max(...arr,0.001);
      const ht = Math.max(3,Math.round((v/max)*24));
      const bg = i===arr.length-1?'#3b82f6':i===0?'#d1d5db':'#93c5fd';
      const tip = `Week ${i+1}: ${v.toFixed(2)} cs`;
      return `<div title="${tip}" style="width:10px;height:${ht}px;background:${bg};border-radius:2px 2px 0 0;display:inline-block;margin:0 1px"></div>`;
    }).join('');
    return `<tr class="border-b border-gray-100 hover:bg-gray-50">
      <td class="px-4 py-2.5 font-medium text-gray-800">${esc(item.name)}<br/><span class="text-xs text-gray-400">${esc(item.category)}</span></td>
      <td class="px-4 py-2.5"><div style="display:flex;align-items:flex-end;height:28px">${bars}</div></td>
      <td class="px-4 py-2.5 text-right font-semibold ${accent}">${sign}${pct}%</td>
      <td class="px-4 py-2.5 text-right text-gray-400 text-xs">$${(item.revenue_latest_week||0).toFixed(0)}/wk</td>
    </tr>`;
  };

  const body = sBy==='category'
    ? catGroupHtml(items, rowFn, 4)
    : items.map(rowFn).join('');

  return `
    <div class="rounded-lg bg-gray-50 border border-gray-200 p-3 text-xs text-gray-600 mb-3 space-y-1">
      <p><strong>% change</strong> = oldest week → newest week velocity change. Not an average.</p>
      <p><strong>$/wk</strong> = most recent week's revenue only. <strong>Stable</strong> = ±15% oldest-to-newest.</p>
      <p>Sparkline bars: grey (oldest) → light blue → <span style="color:#3b82f6">blue (newest)</span>. Hover for exact figures.</p>
    </div>
    <div class="flex items-center justify-between flex-wrap gap-2 mb-3">
      <div class="flex border-b border-gray-200">
        ${subTabs.map(t=>`<button onclick="S.momentumTab.momentum='${t.k}';renderPanel()"
          class="px-4 py-2 text-sm font-medium border-b-2 ${S.momentumTab.momentum===t.k?'border-blue-500 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}">${t.label}</button>`).join('')}
      </div>
      <div class="flex gap-1 items-center">
        <input type="text" placeholder="Search…" value="${esc(S.search.momentum||'')}" oninput="S.search.momentum=this.value;renderPanel()"
          class="border rounded px-2 py-1 text-xs w-36 focus:outline-none focus:ring-1 focus:ring-blue-300"/>
        ${sortBtn('momentum','revenue','Sort: Revenue')}${sortBtn('momentum','category','Sort: Category')}
      </div>
    </div>
    ${tbl(`<tr>${th('Item')}${th('Last 4 Weeks')}${thr('% Change','Oldest → newest week')}${thr('Latest Rev','Most recent weekly revenue')}</tr>`, body)}`;
}

// ── Historical ─────────────────────────────────────────────────────────────────
function renderHistorical() {
  const sBy = S.sortBy.historical||'monthly';
  let items = searchFilter(S.data.historical||[], 'historical');
  if (sBy==='monthly')  items=[...items].sort((a,b)=>(b.monthly_revenue||0)-(a.monthly_revenue||0));
  else if(sBy==='yearly') items=[...items].sort((a,b)=>(b.yearly_revenue||0)-(a.yearly_revenue||0));
  else if(sBy==='trend')  items=[...items].sort((a,b)=>(b.trend_vs_monthly||0)-(a.trend_vs_monthly||0));
  else if(sBy==='category') items=sortByCategory(items,x=>x.monthly_revenue||0);

  const trendBadge = (pct) => {
    if(pct==null) return '<span class="text-gray-300">—</span>';
    const cls = pct>10?'text-green-700 bg-green-50 border-green-200':pct<-10?'text-red-700 bg-red-50 border-red-200':'text-gray-600 bg-gray-50 border-gray-200';
    return `<span class="text-xs font-semibold px-1.5 py-0.5 rounded border ${cls}" title="Recent 4-wk pace vs Jan–Apr avg">${pct>0?'+':''}${pct.toFixed(0)}%</span>`;
  };

  const rowFn = (item) => `<tr class="border-b border-gray-100 hover:bg-gray-50">
    <td class="px-4 py-2.5 font-medium text-gray-800 max-w-xs">
      <span class="block truncate">${esc(item.name)}</span>
      <div class="flex gap-1 mt-0.5">
        ${item.in_monthly?'<span class="text-xs px-1 rounded bg-green-100 text-green-700">monthly</span>':''}
        ${item.in_yearly?'<span class="text-xs px-1 rounded bg-blue-100 text-blue-700">yearly</span>':''}
      </div>
    </td>
    <td class="px-4 py-2.5 text-xs text-gray-400">${esc(item.category)}</td>
    <td class="px-4 py-2.5 text-right text-gray-700">${item.monthly_revenue?'$'+item.monthly_revenue.toLocaleString():'—'}</td>
    <td class="px-4 py-2.5 text-right text-gray-500">${item.yearly_revenue?'$'+item.yearly_revenue.toLocaleString():'—'}</td>
    <td class="px-4 py-2.5 text-right text-gray-600">${item.est_weekly_from_monthly?'$'+item.est_weekly_from_monthly.toFixed(0):'—'}</td>

// ── Margins ───────────────────────────────────────────────────────────────────
const CAUSE_STYLE = {promotional:'bg-amber-100 text-amber-700',structural:'bg-blue-100 text-blue-700',pricing_error:'bg-red-100 text-red-700',unknown:'bg-gray-100 text-gray-600'};
const CAUSE_LABEL = {promotional:'Promo',structural:'Structural',pricing_error:'Pricing Error',unknown:'Unknown'};
const CAUSE_TIP   = {
  promotional:'Bottlemart chain-funded deal — reimbursed to you. No action needed.',
  structural:'Chain-price-locked item (e.g. Carlton). Hard to raise. Flag for supplier negotiation.',
  pricing_error:'Your shelf price may be too low. Check POS.',
  unknown:'Root cause unclear — cross-check supplier invoice vs sell price.'
};

function renderMargins() {
  const cFilt = S.causeFilter.margins||'ALL';
  const sBy   = S.sortBy.margins||'drag';
  const s     = S.data.summary||{};
  const store = s.store_margin||{};

  let items = searchFilter(S.data.margins||[], 'margins')
    .filter(x=>cFilt==='ALL'||x.cause===cFilt);
  if (sBy==='category') items=sortByCategory(items,x=>x.dollar_drag||0);
  else items=[...items].sort((a,b)=>b.dollar_drag-a.dollar_drag);

  const totalDrag = (S.data.margins||[]).reduce((s,x)=>s+x.dollar_drag,0);
  const viewDrag  = items.reduce((s,x)=>s+x.dollar_drag,0);

  const rowFn = (item) => `<tr class="border-b border-gray-100 hover:bg-gray-50">
    <td class="px-4 py-2.5 font-medium text-gray-800">${esc(item.name)}<br/><span class="text-xs text-gray-400">${esc(item.category)}</span></td>
    <td class="px-4 py-2.5 text-right text-gray-700">$${item.revenue.toLocaleString()}</td>
    <td class="px-4 py-2.5 text-right text-gray-600">${item.reported_margin_pct.toFixed(1)}%</td>
    <td class="px-4 py-2.5 text-right font-semibold text-orange-600">${item.true_margin_pct.toFixed(1)}%</td>
    <td class="px-4 py-2.5 text-right text-gray-500">${item.floor_pct.toFixed(0)}%</td>
    <td class="px-4 py-2.5 text-right bg-red-50">
      <span class="font-bold text-red-600">$${item.dollar_drag.toFixed(2)}</span>
      <span class="block text-xs text-gray-400">${(item.pct_of_total_drag||0).toFixed(1)}% of drag</span>
    </td>
    <td class="px-4 py-2.5 text-right text-amber-600 text-xs">${item.promo_savings>0?'$'+item.promo_savings.toFixed(2):'—'}</td>
    <td class="px-4 py-2.5 text-center">
      <span title="${esc(CAUSE_TIP[item.cause]||'')}" class="text-xs font-medium px-2 py-0.5 rounded-full cursor-help ${CAUSE_STYLE[item.cause]||'bg-gray-100 text-gray-500'}">
        ${CAUSE_LABEL[item.cause]||item.cause}
      </span>
    </td>
    <td class="px-4 py-2.5 text-right text-xs">
      ${item.wow_margin_delta_pts!=null?`<span class="${item.wow_margin_delta_pts<-2?'text-red-500 font-semibold':item.wow_margin_delta_pts>2?'text-green-600':'text-gray-400'}">${item.wow_margin_delta_pts>0?'+':''}${item.wow_margin_delta_pts.toFixed(1)} pts</span>`:'—'}
    </td>
  </tr>`;

  const body = sBy==='category'?catGroupHtml(items,rowFn,9):items.map(rowFn).join('');

  const sumCards = store.latest_week_revenue ? `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      ${[
        ['Reported Margin',(store.latest_week_margin_pct||0).toFixed(2)+'%'],
        ['True Margin (excl promo)',(store.latest_week_true_margin_pct||0).toFixed(2)+'%'],
        ['Weekly Revenue','$'+(store.latest_week_revenue||0).toLocaleString()],
        ['Promo Savings','$'+(store.latest_week_promo_total||0).toFixed(0)+' (chain-funded)'],
      ].map(([l,v])=>`<div class="rounded-lg border border-gray-200 p-3 bg-white"><p class="text-xs text-gray-500 mb-1">${l}</p><p class="text-xl font-bold text-gray-800">${v}</p></div>`).join('')}
    </div>` : '';

  return `
    ${sumCards}
    <details class="mb-3"><summary class="text-xs text-blue-500 cursor-pointer">▼ Column glossary</summary>
    <div class="mt-2 rounded-lg bg-blue-50 border border-blue-200 p-3 text-xs text-gray-700 space-y-1">
      <p><strong>Revenue</strong> — total sales this week. <strong>Reported %</strong> — margin in POS (may include promo credits).</p>
      <p><strong>True %</strong> — margin after stripping Bottlemart promo contributions. Your actual profitability.</p>
      <p><strong>Floor</strong> — minimum margin target for this category. <strong>$ Drag</strong> — Revenue × (Floor − True%). Extra profit if you hit floor.</p>
      <p><strong>Promo $</strong> — chain-funded discount (reimbursed, not your cost). <strong>WoW</strong> — True% change vs last week (pts = percentage points).</p>
      <p><strong>Cause badges:</strong> <em>Promo</em> = no action. <em>Structural</em> = chain-locked price. <em>Pricing Error</em> = fix your shelf price. Hover each badge for detail.</p>

    <div class="text-sm mb-3 text-gray-500">
      <strong class="text-red-600">$${totalDrag.toFixed(2)}</strong> total weekly drag across <strong>${(S.data.margins||[]).length}</strong> items
      ${viewDrag<totalDrag?` · <strong>$${viewDrag.toFixed(2)}</strong> in view`:''}
    </div>
    ${controlBar('margins',
      `<div class="flex gap-1">${['ALL','pricing_error','structural','promotional','unknown'].map(c=>filterBtn('causeFilter','margins',c,c==='ALL'?'All':(CAUSE_LABEL[c]||c))).join('')}</div>`+
      `<div class="flex gap-1 ml-2 pl-2 border-l">${sortBtn('margins','drag','Sort: $ Drag')}${sortBtn('margins','category','Sort: Category')}</div>`

    ${tbl(`<tr>${th('Item')}${thr('Revenue')}${thr('Reported %','Margin in POS')}${thr('True %','After promo adjustment')}${thr('Floor','Category minimum')}${thr('$ Drag','Weekly profit gap','bg-red-50')}${thr('Promo $','Chain-funded discount')}${th('Cause','Hover for explanation','text-center')}${thr('WoW Margin','Change vs last week in ppts')}</tr>`,body)}`;

// ── Pricing ────────────────────────────────────────────────────────────────────
const RISK_STYLE = {low:'bg-green-100 text-green-700',medium:'bg-yellow-100 text-yellow-800',high:'bg-red-100 text-red-700'};
const RISK_TIP   = {low:'Low price sensitivity — safe to increase.',medium:'Moderate sensitivity — consider a small test first.',high:'Chain-priced or volume-sensitive — customers will notice. Verify first.'};

function renderPricing() {
  const rFilt = S.riskFilter.pricing||'ALL';
  const sBy   = S.sortBy.pricing||'gain';

  let items = searchFilter(S.data.pricing||[], 'pricing')
    .filter(x=>rFilt==='ALL'||x.risk_level===rFilt);
  const riskOrder={low:0,medium:1,high:2};
  if(sBy==='category') items=sortByCategory(items,x=>x.annual_profit_gain||0);
  else items=[...items].sort((a,b)=>(riskOrder[a.risk_level]||1)-(riskOrder[b.risk_level]||1)||b.annual_profit_gain-a.annual_profit_gain);

  const totalUpside = (S.data.pricing||[]).reduce((s,x)=>s+(x.annual_profit_gain||0),0);
  const viewUpside  = items.reduce((s,x)=>s+(x.annual_profit_gain||0),0);

  const rowFn = (item) => `<tr class="border-b border-gray-100 hover:bg-gray-50">
    <td class="px-4 py-2.5 font-medium text-gray-800">
      ${esc(item.name)}<br/><span class="text-xs text-gray-400">${esc(item.category)}</span>
      ${item.cause==='structural'?'<br/><span class="text-xs px-1.5 rounded bg-blue-100 text-blue-700">chain-priced</span>':''}
    </td>
    <td class="px-4 py-2.5 text-right text-gray-600">$${(item.revenue_per_week||0).toFixed(0)}</td>
    <td class="px-4 py-2.5 text-right text-orange-600 font-medium">${(item.current_margin_pct||0).toFixed(1)}%</td>

    <td class="px-4 py-2.5 text-right">
      <span class="font-medium text-gray-800">$${(item.current_unit_price||0).toFixed(2)}</span>
      <span class="block text-xs ${item.price_source==='avg_txn'?'text-amber-600':'text-gray-400'}">${item.price_source==='avg_txn'?'≈ avg txn':'shelf price'}</span>
    </td>
    <td class="px-4 py-2.5 text-right bg-green-50">
      <span class="font-bold text-green-700">$${(item.suggested_price||0).toFixed(2)}</span>
      <span class="block text-xs text-green-600">+$${(item.price_increase_dollar||0).toFixed(2)} (${(item.price_increase_pct||0).toFixed(1)}%)</span>
    </td>
    <td class="px-4 py-2.5 text-right bg-green-50">
      <span class="font-bold text-green-700">$${(item.annual_profit_gain||0).toLocaleString(undefined,{maximumFractionDigits:0})}</span>
      <span class="block text-xs text-gray-400">$${(item.weekly_profit_gain||0).toFixed(2)}/wk</span>
    </td>
    <td class="px-4 py-2.5 text-center text-xs text-gray-600">${esc(item.momentum)}</td>
    <td class="px-4 py-2.5 text-center">
      <span title="${esc(RISK_TIP[item.risk_level]||'')}" class="text-xs font-medium px-2 py-0.5 rounded-full cursor-help ${RISK_STYLE[item.risk_level]||'bg-gray-100 text-gray-500'}">
        ${item.risk_level}
      </span>
    </td>
  </tr>`;

  const body = sBy==='category'?catGroupHtml(items,rowFn,8):items.map(rowFn).join('');

  return `
    <div class="rounded-lg bg-green-50 border border-green-200 p-4 mb-4">
      <p class="text-sm text-green-700">
        <strong class="text-lg text-green-800">$${totalUpside.toLocaleString(undefined,{maximumFractionDigits:0})}</strong>
        potential annual profit gain from ${(S.data.pricing||[]).length} price increase candidates
        ${viewUpside<totalUpside?` · <span class="font-medium">$${viewUpside.toLocaleString(undefined,{maximumFractionDigits:0})} in view</span>`:''}
      </p>
      <p class="text-xs text-green-600 mt-1">Excludes promo items · excludes falling momentum · capped at +15% · rounded to $0.50</p>
    </div>
    <details class="mb-3"><summary class="text-xs text-blue-500 cursor-pointer">▼ How to read this table</summary>
    <div class="mt-2 rounded-lg bg-blue-50 border border-blue-200 p-3 text-xs text-gray-700 space-y-1">
      <p><strong>Current $</strong> = single-unit shelf price from inventory. "≈ avg txn" = no shelf price found, using transaction average.</p>
      <p><strong>Suggested $</strong> = price to hit floor margin. Capped +15%, rounded $0.50. <strong>Annual Gain</strong> = weekly gain × 52 at current volume.</p>
      <p><strong>Risk LOW</strong> = spirits/cognac/tequila/sparkling wine — safe to raise. <strong>HIGH</strong> = beer or chain-priced — verify first.</p>
    </div></details>
    ${controlBar('pricing',
      `<div class="flex gap-1">${['ALL','low','medium','high'].map(r=>filterBtn('riskFilter','pricing',r,r==='ALL'?'All Risk':r.charAt(0).toUpperCase()+r.slice(1)+' Risk')).join('')}</div>`+

    )}

}

// ── Revival ────────────────────────────────────────────────────────────────────
function renderRevival() {
  const sBy    = S.sortBy.revival||'revenue';
  const obs    = new Set((S.flags.obsolete_items||[]).map(n=>n.toLowerCase()));
  const ltd    = new Set((S.flags.limited_edition_overrides||[]).map(n=>n.toLowerCase()));
  const inStockOnly = S.revivalInStock||false;

  const all    = S.data.revival||[];
  const tops   = searchFilter(all.filter(x=>x.top_pick), 'revival').filter(x=>!inStockOnly||x.in_inventory);
  const rest   = searchFilter(all.filter(x=>!x.top_pick), 'revival').filter(x=>!inStockOnly||x.in_inventory);
  const totalRev = all.reduce((s,x)=>s+(x.est_weekly_revenue||0),0);
  const showAll  = S.showAll.revival||false;

  function revRow(item) {
    const isLtdOv = ltd.has(item.name.toLowerCase());
    return `<tr class="border-b border-gray-100 hover:bg-gray-50 ${item.top_pick?'bg-yellow-50/30':''}">
      <td class="px-3 py-2.5 text-xs text-gray-400">${item.revival_rank}</td>

      </td>
      <td class="px-4 py-2.5 text-right text-gray-700">$${(item.yearly_revenue||0).toLocaleString()}</td>

      <td class="px-4 py-2.5 text-right text-gray-600">${item.margin_pct_historical>0?item.margin_pct_historical.toFixed(1)+'%':'—'}</td>
      <td class="px-4 py-2.5 text-center">${item.in_inventory?'<span class="text-green-600 text-xs font-medium">✓ Yes</span>':'<span class="text-red-400 text-xs">✗ No</span>'}</td>
      <td class="px-4 py-2.5 text-right text-gray-600">${item.in_inventory?item.current_stock_cases.toFixed(1)+' cs':'—'}</td>
      <td class="px-4 py-2.5 text-right bg-purple-50">
        <span class="font-bold text-purple-700">${item.suggested_order_cases}</span>

      <td class="px-4 py-2.5 text-center text-xs space-y-1">
        ${item.is_limited_edition?`<button onclick="toggleLtdOverride('${esc(item.name)}')" class="${isLtdOv?'text-amber-600 hover:text-amber-800':'text-gray-300 hover:text-amber-500'} block w-full">${isLtdOv?'★ override':'☆ override'}</button>`:''}
      </td>
    </tr>`;
  }

  const revHead = `<tr>
    ${th('#','')} ${th('Item','')} ${thr('2025 Revenue','Total 2025 revenue')} ${thr('Txns','')} ${thr('Est $/wk','2025 revenue ÷ report weeks')}
    ${thr('Hist Margin','')} ${th('In System?','','text-center')} ${thr('Stock','')} ${thr('Order Cases','2 wks velocity – current stock','bg-purple-50')} ${th('Rationale','')} ${th('','')}
  </tr>`;

  const topsBody = sBy==='category'?catGroupHtml(tops,revRow,11):tops.map(revRow).join('');
  const restItems = showAll?rest:rest.slice(0,30);
  const restBody  = sBy==='category'?catGroupHtml(restItems,revRow,11):restItems.map(revRow).join('');

  return `
    <div class="rounded-lg bg-purple-50 border border-purple-200 p-4 mb-4">
      <p class="text-sm text-purple-700">
        <strong class="text-lg text-purple-800">${all.length}</strong> items sold in 2025 but absent from Jan–Apr 2026 and recent weekly reports.
        <strong>≈$${totalRev.toFixed(0)}/wk</strong> in potential recovered revenue.
      </p>
    </div>
    ${controlBar('revival',
      `<label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer">
        <input type="checkbox" ${inStockOnly?'checked':''} onchange="S.revivalInStock=this.checked;renderPanel()"/> In inventory only
       </label>`+
      `<div class="flex gap-1 ml-2 pl-2 border-l">${sortBtn('revival','revenue','Sort: Revenue')}${sortBtn('revival','category','Sort: Category')}</div>`
    )}

    ${tops.length?`
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-base font-bold text-yellow-700">⭐ Top 20 Revival Picks</span>
        <span class="text-xs text-gray-400">— highest historical weekly revenue</span>
      </div>
      <div class="rounded-lg border-2 border-yellow-300 overflow-hidden shadow-sm">

    <div>
      <div class="flex items-center gap-2 mb-2">
        <span class="text-sm font-semibold text-gray-600">Other candidates (${rest.length})</span>
        ${!showAll&&rest.length>30?`<button onclick="S.showAll.revival=true;renderPanel()" class="text-xs text-blue-500 underline">Show all</button>`:''}
      </div>
      <div class="rounded-lg border border-gray-200 overflow-hidden shadow-sm">
        ${tbl(`${revHead}`,restBody)}
      </div>
      ${!showAll&&rest.length>30?`<button onclick="S.showAll.revival=true;renderPanel()" class="mt-2 text-xs text-blue-500 underline">+ ${rest.length-30} more…</button>`:''}
    </div>`:''}

    <p class="text-xs text-gray-400 mt-3">☆ override = include this limited/vintage item anyway. Flags saved to browser (localStorage).</p>`;
}

function toggleLtdOverride(name) {
  const lc = name.toLowerCase();
  const cur = S.flags.limited_edition_overrides||[];
  if(cur.map(n=>n.toLowerCase()).includes(lc)) {
    S.flags.limited_edition_overrides = cur.filter(n=>n.toLowerCase()!==lc);
  } else {
    S.flags.limited_edition_overrides = [...cur, name];
  }
  saveFlags(); renderPanel();
}

// ── Help / Briefing ───────────────────────────────────────────────────────────
function toggleHelp() {
  const overlay = document.getElementById('help-overlay');
  const drawer  = document.getElementById('help-drawer');
  const isOpen  = drawer.classList.contains('open');
  if(isOpen) {
    drawer.classList.remove('open'); overlay.classList.add('hidden');
  } else {
    document.getElementById('help-content').innerHTML = getBriefingHtml();
    drawer.classList.add('open'); overlay.classList.remove('hidden');
  }
}

      <div>
        <h3 class="font-bold text-gray-800 mb-2">💰 Pricing Tab</h3>
        <p>Items where raising the price would bring margin up to the floor. Only shows stable/rising items — falling items excluded. Risk LOW = safe to increase; HIGH = verify first.</p>
        <p class="mt-1 text-gray-500 text-xs">Current $ = single-unit shelf price from inventory. Suggested $ capped at +15%, rounded to $0.50.</p>
      </div>

      <div>
        <h3 class="font-bold text-gray-800 mb-2">🔄 Revival Tab</h3>
        <p>Items that were selling in 2025 but haven't appeared in any 2026 data. Top 20 are ranked by estimated weekly revenue recovery. Order suggested = 2 weeks of historical pace.</p>
        <p class="mt-1 text-gray-500 text-xs">Kegs and limited/vintage editions are auto-excluded. Use ☆ override to include a limited item you still want to stock.</p>
      </div>

      <div class="rounded-lg bg-gray-50 border border-gray-200 p-3">
        <h3 class="font-bold text-gray-800 mb-1">Handover Notes</h3>
        <p class="text-xs text-gray-600">To refresh data: run <code class="bg-gray-200 px-1 rounded">python run_analysis.py</code> in the BMSS Order App folder, then copy the data/ JSON files here and push.</p>
        <p class="text-xs text-gray-600 mt-1">Obsolete/override flags are saved to your browser (localStorage). They won't transfer between devices.</p>
      </div>
    </div>`;
}

document.addEventListener('DOMContentLoaded', loadAll);
